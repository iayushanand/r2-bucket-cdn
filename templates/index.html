<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDN - Ayush Anand</title>
    <link rel="stylesheet" href="/static/dist/output.css">
    <style>
        .drop-active {
            border-color: var(--drop-border) !important;
            background: var(--drop-bg) !important;
        }

        .stripe:nth-child(even) {
            background: var(--bg-stripe);
        }

        .stripe:hover {
            background: var(--bg-hover) !important;
        }
    </style>
</head>

<body class="min-h-screen">

    <div class="max-w-4xl mx-auto px-3 sm:px-6 py-6 space-y-6">

        <header
            class="border-2 border-[var(--border-strong)] bg-[var(--bg-card)] p-3 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
            <div class="flex items-center gap-2">
                <span class="text-xl">☁️</span>
                <h1 class="text-lg font-bold">CDN Panel</h1>
                <span class="text-xs" style="color: var(--text-muted);">— cdn.ayushanand.com</span>
            </div>
            <div class="flex items-center gap-2">
                <button id="themeToggle" onclick="toggleTheme()"
                    class="px-2 py-1 text-sm border border-[var(--border)] bg-[var(--btn-bg)] hover:bg-[var(--btn-hover)] cursor-pointer transition-colors"
                    title="Toggle theme">☀️</button>
                <a href="/logout"
                    class="px-3 py-1 text-sm border border-[var(--border)] bg-[var(--btn-bg)] hover:bg-[var(--btn-hover)] transition-colors no-underline"
                    style="color: var(--text);">
                    Logout
                </a>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-[1fr_220px] gap-4">
            <div id="dropZone"
                class="border-2 border-dashed border-[var(--border-strong)] bg-[var(--bg-card)] p-8 sm:p-10 flex flex-col items-center justify-center text-center cursor-pointer transition-colors">
                <input type="file" id="fileInput" class="hidden" multiple>
                <div class="pointer-events-none space-y-2">
                    <div class="text-4xl">📤</div>
                    <p class="font-bold text-sm">Drop files here or <span
                            style="color: var(--accent); text-decoration: underline;">browse</span></p>
                    <p class="text-xs" style="color: var(--text-muted);">Any file type supported</p>
                </div>

                <div id="progressContainer" class="hidden mt-4 w-full max-w-xs space-y-1">
                    <div class="flex justify-between text-xs" style="color: var(--text-muted);">
                        <span id="progressFile" class="truncate max-w-[80%]">Uploading...</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="w-full h-3 border border-[var(--border)]" style="background: var(--bg);">
                        <div id="progressBar" class="h-full transition-all"
                            style="width: 0%; background: var(--progress);"></div>
                    </div>
                </div>
            </div>

            <div
                class="border-2 border-[var(--border-strong)] bg-[var(--bg-card)] p-4 flex flex-col justify-center space-y-3">
                <p class="font-bold text-sm">Expiration:</p>
                <p class="text-xs" style="color: var(--text-muted);">Auto-delete files after:</p>
                <select id="expirySelect"
                    class="w-full border-2 border-[var(--border-strong)] px-2 py-1.5 text-sm cursor-pointer focus:outline-none"
                    style="background: var(--select-bg); color: var(--text);">
                    <option value="1">1 Day</option>
                    <option value="7">7 Days</option>
                    <option value="30">30 Days</option>
                    <option value="90">90 Days</option>
                    <option value="never" selected>Never</option>
                </select>
            </div>
        </div>

        <div class="border-2 border-[var(--border-strong)] bg-[var(--bg-card)] overflow-hidden">
            <div class="border-b-2 border-[var(--border)] px-4 py-2 flex items-center justify-between"
                style="background: var(--bg-stripe);">
                <span class="font-bold text-sm">Uploaded Files</span>
                <span id="fileCount" class="text-xs" style="color: var(--text-muted);">0 files</span>
            </div>

            <div class="hidden sm:block overflow-x-auto">
                <table class="w-full text-sm border-collapse">
                    <thead>
                        <tr style="background: var(--bg-stripe);">
                            <th class="text-left px-4 py-2 border-b border-[var(--border)] font-bold text-xs uppercase">
                                Name</th>
                            <th class="text-left px-4 py-2 border-b border-[var(--border)] font-bold text-xs uppercase">
                                Size</th>
                            <th class="text-left px-4 py-2 border-b border-[var(--border)] font-bold text-xs uppercase">
                                Date</th>
                            <th
                                class="text-right px-4 py-2 border-b border-[var(--border)] font-bold text-xs uppercase">
                                Actions</th>
                        </tr>
                    </thead>
                    <tbody id="fileTableBody">
                    </tbody>
                </table>
            </div>

            <div id="fileCards" class="sm:hidden">
            </div>

            <div id="emptyState" class="text-center py-12" style="color: var(--text-muted);">
                <p class="text-sm">No files uploaded yet.</p>
                <p class="text-xs mt-1">Drop a file above to get started.</p>
            </div>
        </div>

        <footer class="text-center text-xs py-2" style="color: var(--text-muted);">
            -- CDN Panel - Ayush Anand --
        </footer>
    </div>

    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeToggle').textContent = isDark ? '🌙' : '☀️';
        }
        (function () {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('themeToggle').textContent = '🌙';
            }
        })();

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileTableBody = document.getElementById('fileTableBody');
        const fileCards = document.getElementById('fileCards');
        const emptyState = document.getElementById('emptyState');
        const fileCount = document.getElementById('fileCount');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressFile = document.getElementById('progressFile');
        const progressPercent = document.getElementById('progressPercent');
        const expirySelect = document.getElementById('expirySelect');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drop-active'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drop-active'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('drop-active');
            if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', () => { if (fileInput.files.length) uploadFiles(fileInput.files); });

        function uploadFiles(files) {
            Array.from(files).forEach(file => {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('expiry_days', expirySelect.value);

                const xhr = new XMLHttpRequest();
                progressContainer.classList.remove('hidden');
                progressFile.textContent = `Uploading ${file.name}`;
                progressBar.style.width = '0%';
                progressPercent.textContent = '0%';

                xhr.upload.addEventListener('progress', e => {
                    if (e.lengthComputable) {
                        const pct = Math.round((e.loaded / e.total) * 100);
                        progressBar.style.width = pct + '%';
                        progressPercent.textContent = pct + '%';
                    }
                });

                xhr.addEventListener('load', () => {
                    progressContainer.classList.add('hidden');
                    fileInput.value = '';
                    if (xhr.status === 200) {
                        showToast('File uploaded successfully!', 'success');
                        loadFiles();
                    } else {
                        showToast('Upload failed. Please try again.', 'error');
                    }
                });

                xhr.addEventListener('error', () => {
                    progressContainer.classList.add('hidden');
                    showToast('Upload failed. Please try again.', 'error');
                });

                xhr.open('POST', '/upload');
                xhr.send(formData);
            });
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function formatDate(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
                ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        function copyUrl(url) {
            navigator.clipboard.writeText(url).then(() => {
                showToast('URL copied to clipboard!', 'success');
            });
        }

        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const borderColor = type === 'success' ? 'var(--success)' : 'var(--danger)';
            const bgColor = type === 'success' ? 'var(--success-bg)' : 'var(--danger-bg)';
            toast.style.cssText = `border: 2px solid ${borderColor}; background: ${bgColor}; color: var(--text); padding: 8px 12px; font-size: 13px; font-family: 'Courier New', monospace;`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function deleteFile(name) {
            if (!confirm('Are you sure you want to delete "' + name + '"?')) return;

            fetch('/file/' + encodeURIComponent(name), { method: 'DELETE' })
                .then(r => r.json())
                .then(res => {
                    if (res.success) {
                        showToast('File deleted successfully', 'success');
                        loadFiles();
                    } else {
                        showToast(res.error || 'Failed to delete file', 'error');
                    }
                })
                .catch(() => showToast('Failed to delete file', 'error'));
        }

        function fileIcon(name) {
            const ext = name.split('.').pop().toLowerCase();
            const icons = {
                'png': '🖼️', 'jpg': '🖼️', 'jpeg': '🖼️', 'gif': '🖼️', 'webp': '🖼️', 'svg': '🖼️', 'bmp': '🖼️',
                'mp4': '🎬', 'avi': '🎬', 'mov': '🎬', 'mkv': '🎬', 'webm': '🎬',
                'mp3': '🎵', 'wav': '🎵', 'ogg': '🎵', 'flac': '🎵',
                'pdf': '📕', 'doc': '📘', 'docx': '📘', 'txt': '📝', 'md': '📝',
                'zip': '📦', 'rar': '📦', 'tar': '📦', 'gz': '📦', '7z': '📦',
                'py': '🐍', 'js': '📜', 'ts': '📜', 'html': '🌐', 'css': '🎨',
                'json': '📋', 'xml': '📋', 'csv': '📊', 'xls': '📊', 'xlsx': '📊',
                'exe': '⚙️', 'msi': '⚙️', 'dmg': '⚙️',
            };
            return icons[ext] || '📄';
        }

        function loadFiles() {
            fetch('/files')
                .then(r => r.json())
                .then(files => {
                    fileTableBody.innerHTML = '';
                    fileCards.innerHTML = '';
                    fileCount.textContent = files.length + ' file' + (files.length !== 1 ? 's' : '');

                    if (files.length === 0) {
                        emptyState.classList.remove('hidden');
                        return;
                    }
                    emptyState.classList.add('hidden');

                    files.forEach((f, i) => {
                        const icon = fileIcon(f.name);
                        const escapedName = f.name.replace(/'/g, "\\'");

                        const tr = document.createElement('tr');
                        tr.className = 'stripe';
                        tr.innerHTML = `
                            <td class="px-4 py-2 border-b border-[var(--border)]">
                                <span class="inline-flex items-center gap-2">
                                    <span>${icon}</span>
                                    <span class="truncate max-w-[220px] lg:max-w-sm" title="${f.name}">${f.name}</span>
                                </span>
                            </td>
                            <td class="px-4 py-2 border-b border-[var(--border)]" style="color: var(--text-muted);">${formatSize(f.size)}</td>
                            <td class="px-4 py-2 border-b border-[var(--border)] whitespace-nowrap" style="color: var(--text-muted);">${formatDate(f.date)}</td>
                            <td class="px-4 py-2 border-b border-[var(--border)] text-right whitespace-nowrap">
                                <button onclick="copyUrl('${f.url}')" class="px-2 py-1 text-xs border border-[var(--border)] cursor-pointer hover:brightness-95 transition-colors" style="background: var(--btn-bg); color: var(--text);" title="Copy URL">
                                    Copy
                                </button>
                                <button onclick="deleteFile('${escapedName}')" class="px-2 py-1 text-xs border border-[var(--border)] cursor-pointer hover:brightness-95 transition-colors ml-1" style="background: var(--btn-bg); color: var(--danger);" title="Delete">
                                    Del
                                </button>
                            </td>
                        `;
                        fileTableBody.appendChild(tr);

                        const card = document.createElement('div');
                        card.className = 'stripe border-b border-[var(--border)] px-4 py-3 space-y-2';
                        card.innerHTML = `
                            <div class="flex items-center gap-2">
                                <span>${icon}</span>
                                <span class="truncate font-bold text-sm" title="${f.name}">${f.name}</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="text-xs" style="color: var(--text-muted);">${formatSize(f.size)} | ${formatDate(f.date)}</span>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="copyUrl('${f.url}')" class="px-2 py-1 text-xs border border-[var(--border)] cursor-pointer" style="background: var(--btn-bg); color: var(--text);">Copy</button>
                                <button onclick="deleteFile('${escapedName}')" class="px-2 py-1 text-xs border border-[var(--border)] cursor-pointer" style="background: var(--btn-bg); color: var(--danger);">Del</button>
                            </div>
                        `;
                        fileCards.appendChild(card);
                    });
                });
        }

        loadFiles();
    </script>
</body>

</html>
