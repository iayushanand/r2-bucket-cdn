<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CDN</title>
    <link rel="stylesheet" href="/static/dist/output.css">
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <button id="themeToggle" onclick="toggleTheme()"
        class="fixed top-4 right-4 text-xl cursor-pointer p-2 border border-[var(--border)] bg-[var(--btn-bg)] hover:bg-[var(--btn-hover)] transition-colors z-50"
        title="Toggle theme">
        ☀️
    </button>

    <div class="w-full max-w-sm border-2 border-[var(--border-strong)] bg-[var(--bg-card)] p-6 space-y-6">

        <div class="border-b-2 border-[var(--border)] pb-3 text-center space-y-2">
            <div class="text-4xl">🔒</div>
            <h1 class="text-xl font-bold">CDN Login</h1>
            <p class="text-sm" style="color: var(--text-muted);">Enter password to continue</p>
        </div>

        {% if error %}
        <div class="border-2 border-[var(--danger)] p-3 text-sm"
            style="background: var(--danger-bg); color: var(--danger);">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-4">
            <div class="space-y-1">
                <label for="password" class="block text-sm font-bold">Password:</label>
                <input type="password" id="password" name="password" required autofocus placeholder="--------"
                    class="w-full px-3 py-2 border-2 border-[var(--border-strong)] text-sm focus:outline-none focus:border-[var(--accent)]"
                    style="background: var(--input-bg); color: var(--text);">
            </div>

            <button type="submit"
                class="w-full py-2 px-4 font-bold text-sm border-2 border-[var(--border-strong)] cursor-pointer hover:brightness-95 active:translate-y-px transition-all"
                style="background: var(--btn-bg); color: var(--text);">
                [ Unlock ]
            </button>
        </form>

        <p class="text-center text-xs" style="color: var(--text-muted);">
            -- Secured Access - CDN Panel --
        </p>
    </div>

    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeToggle').textContent = isDark ? '🌙' : '☀️';
        }

        (function () {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('themeToggle').textContent = '🌙';
            }
        })();
    </script>
</body>

</html>
